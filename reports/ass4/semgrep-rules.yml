rules:
  - id: seed-password-printing
    languages: [python]
    message: Printing generated or configured passwords to stdout can leak secrets.
    severity: ERROR
    patterns:
      - pattern-regex: 'print\(f?".*password:.*"\)'

  - id: verbose-audit-logging-trace
    languages: [python]
    message: Logging stack traces in audit paths may leak internal details.
    severity: ERROR
    pattern: logger.warning("Failed to write audit log entry", exc_info=True)
